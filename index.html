<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Score Master</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; min-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00d4ff; }
        input { padding: 10px; border-radius: 5px; border: none; width: 80%; margin-bottom: 10px; }
        button { background: #00d4ff; color: #121212; border: none; padding: 12px 25px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        #score-display { font-size: 2.5em; color: #ffcc00; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h1>Welcome</h1>
        <p>プレイヤー名を入力してください</p>
        <input type="text" id="player-name-input" placeholder="名前を入力">
        <br>
        <button onclick="login()">ログイン / 新規登録</button>
    </div>

    <div id="main-screen" class="card hidden">
        <h1 id="welcome-msg">Hi, Player</h1>
        <div id="score-display">0</div>
        <p>現在のポイント</p>
        <button onclick="addPoint()">クイズ正解！(+10pt)</button>
        <br>
        <button style="background:#555; color:white;" onclick="logout()">ログアウト</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5BrxMGY1qTwF2S4vc_j9DmquK-rCfoN0YnDLIMR5vM6xTmg1znmGT2n6mXnOuSbJ7/exec";
        let currentUser = JSON.parse(localStorage.getItem('gameUser'));

        // 起動時にログイン済みかチェック
        window.onload = () => {
            if (currentUser) {
                showMainScreen();
            }
        };

        async function login() {
            const name = document.getElementById('player-name-input').value;
            if (!name) return alert("名前を入力してね");

            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", userName: name })
            });
            const data = await res.json();

            if (data.status === "success") {
                currentUser = data;
                localStorage.setItem('gameUser', JSON.stringify(data));
                showMainScreen();
            }
        }

        function showMainScreen() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Hi, " + currentUser.userName;
            document.getElementById('score-display').innerText = currentUser.points;
        }

        async function addPoint() {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "addPoint", userId: currentUser.userId, points: 10 })
            });
            const data = await res.json();
            if (data.status === "success") {
                currentUser.points = data.newPoint;
                localStorage.setItem('gameUser', JSON.stringify(currentUser));
                document.getElementById('score-display').innerText = data.newPoint;
            }
        }

        function logout() {
            localStorage.removeItem('gameUser');
            location.reload();
        }
    </script>
</body>
</html>
